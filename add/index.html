<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Add me on Village</title>
  <meta name="color-scheme" content="light dark" />

  <!-- Open Graph: makes the iMessage/SMS link preview look like a real invite. -->
  <meta property="og:title" content="Add me on Village" />
  <meta property="og:description" content="Village is how friends keep up with each other and make plans. Tap to add me." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://zachrose17.github.io/village-legal/og-image.png" />
  <meta property="og:image:width" content="1024" />
  <meta property="og:image:height" content="1024" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:image" content="https://zachrose17.github.io/village-legal/og-image.png" />

  <style>
    :root {
      --bg: #f6f4ef;
      --bg-elevated: #ffffff;
      --ink1: #1b1a17;
      --ink2: #54514a;
      --ink3: #8a867c;
      --hairline: rgba(0,0,0,0.08);
      --action: #1b1a17;
      --action-ink: #ffffff;
      --accent-soft: #efece4;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14130f;
        --bg-elevated: #1e1c18;
        --ink1: #f4f1ea;
        --ink2: #b8b4aa;
        --ink3: #847f74;
        --hairline: rgba(255,255,255,0.10);
        --action: #f4f1ea;
        --action-ink: #14130f;
        --accent-soft: #26241f;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--ink1);
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--bg-elevated);
      border: 1px solid var(--hairline);
      border-radius: 28px;
      padding: 36px 28px 28px;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.08);
    }
    .avatar {
      width: 92px; height: 92px;
      border-radius: 50%;
      margin: 0 auto 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; font-weight: 600;
      color: #fff;
      background: #b9a;
      object-fit: cover;
      overflow: hidden;
    }
    h1 {
      font-size: 25px;
      line-height: 1.25;
      font-weight: 600;
      margin: 0 0 10px;
      letter-spacing: -0.01em;
    }
    .sub {
      color: var(--ink2);
      font-size: 15px;
      margin: 0 auto 28px;
      max-width: 300px;
    }
    .cta {
      display: block;
      width: 100%;
      padding: 15px 18px;
      border-radius: 16px;
      background: var(--action);
      color: var(--action-ink);
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
    .cta:active { opacity: 0.85; }
    .foot {
      margin: 18px 0 0;
      font-size: 12.5px;
      color: var(--ink3);
      line-height: 1.5;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 22px;
    }
    .dot { width: 16px; height: 16px; border-radius: 50%; background: var(--ink1); display:inline-block; }
  </style>
</head>
<body>
  <main class="card" id="card" aria-live="polite">
    <div class="badge"><span class="dot"></span> Village</div>
    <div class="avatar" id="avatar">·</div>
    <h1 id="title">Add me on Village</h1>
    <p class="sub" id="sub">Village is how friends keep up with each other and make plans.</p>
    <a class="cta" id="cta" href="#">Get Village</a>
    <p class="foot" id="foot">Free to join.</p>
  </main>

  <script>
    // Pre-launch: send people to the TestFlight beta. Swap this for the real
    // App Store listing (https://apps.apple.com/app/village/id…) once published.
    const APP_STORE_URL = "https://testflight.apple.com/join/Gm7rhqBQ";

    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    // "from" carries the sharer's display name; "uid" is their profile id, used
    // by the app's deep-link handler once universal links are wired up.
    const from = (params.get("from") || "").trim();

    function initials(name) {
      const parts = (name || "").trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return "·";
      return (parts[0][0] + (parts[1]?.[0] || "")).toUpperCase();
    }
    // Stable warm hue from the name, mirroring the app's avatar coloring.
    function hueFor(name) {
      let h = 0;
      for (const ch of (name || "Village")) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
      return h % 360;
    }

    $("cta").href = APP_STORE_URL;

    if (from) {
      document.title = `${from} wants you on their Village`;
      $("avatar").style.background = `hsl(${hueFor(from)} 45% 55%)`;
      $("avatar").textContent = initials(from);
      $("title").textContent = `${from} wants you on their Village`;
      $("sub").textContent = `Get the app and you can add ${from} back — it's how friends keep up with each other and make plans.`;
    } else {
      $("avatar").style.background = "var(--ink1)";
      $("avatar").textContent = "·";
      $("title").textContent = "Join your friend on Village";
      $("sub").textContent = "Village is how friends keep up with each other and make plans. Get the app to get started.";
    }
  </script>
</body>
</html>
