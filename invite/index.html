<!DOCTYPE html>
<!--
  Orbit personalized invite landing page.
  Served verbatim (no Jekyll front matter) at /orbit-legal/invite/.
  Reads the `from` query param to say "<inviter> invited you to their Orbit".
  The optional `i` token is reserved for a future backend that reconciles the
  connection by inviter; the page works fully without it.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>You're invited to Orbit</title>
  <meta name="theme-color" content="#F7F3ED" />
  <meta property="og:title" content="You're invited to Orbit" />
  <meta property="og:description" content="Add them on Orbit to stay in touch." />
  <style>
    :root {
      --bg: #F7F3ED;
      --bg-elevated: #FDFAF5;
      --ink1: #1F1A17;
      --ink2: #524A43;
      --ink3: #7A7168;
      --hairline: rgba(31, 26, 23, 0.09);
      --soft: rgba(31, 26, 23, 0.06);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100svh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink1);
      background: var(--bg);
      background-image:
        radial-gradient(120% 80% at 80% -10%, rgba(186, 222, 235, 0.55), transparent 60%),
        radial-gradient(120% 90% at -10% 110%, rgba(205, 226, 196, 0.55), transparent 55%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 20px calc(28px + env(safe-area-inset-bottom));
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--bg-elevated);
      border: 1px solid var(--hairline);
      border-radius: 26px;
      padding: 34px 26px 28px;
      text-align: center;
      box-shadow: 0 24px 60px -28px rgba(31, 26, 23, 0.28);
    }
    .rings { width: 96px; height: 96px; margin: 0 auto 22px; display: block; }
    .eyebrow {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--ink3);
      margin: 0 0 12px;
    }
    h1 {
      font-size: 25px;
      line-height: 1.22;
      font-weight: 600;
      margin: 0 0 12px;
      letter-spacing: -0.2px;
    }
    h1 .name { white-space: nowrap; }
    p.sub {
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink2);
      margin: 0 auto 26px;
      max-width: 300px;
    }
    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      color: var(--bg-elevated);
      background: var(--ink1);
      padding: 16px 20px;
      border-radius: 16px;
      text-decoration: none;
      transition: opacity 0.15s ease;
    }
    .cta:active { opacity: 0.85; }
    .soon {
      margin: 14px auto 0;
      font-size: 13px;
      color: var(--ink3);
      max-width: 280px;
      line-height: 1.45;
      display: none;
    }
    .soon.show { display: block; }
    .footer {
      margin-top: 26px;
      padding-top: 18px;
      border-top: 1px solid var(--hairline);
      font-size: 12px;
      color: var(--ink3);
      line-height: 1.6;
    }
    .footer a { color: var(--ink2); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <svg class="rings" viewBox="0 0 96 96" fill="none" aria-hidden="true">
      <circle cx="48" cy="48" r="45" stroke="#1F1A17" stroke-opacity="0.10" stroke-width="2" />
      <circle cx="48" cy="48" r="31" stroke="#1F1A17" stroke-opacity="0.16" stroke-width="2" />
      <circle cx="48" cy="48" r="17" stroke="#1F1A17" stroke-opacity="0.24" stroke-width="2" />
      <circle cx="48" cy="48" r="6" fill="#1F1A17" />
      <circle cx="79" cy="48" r="5" fill="#1F1A17" fill-opacity="0.55" />
      <circle cx="33" cy="20" r="4.5" fill="#1F1A17" fill-opacity="0.7" />
    </svg>

    <p class="eyebrow">You're invited</p>
    <h1 id="headline">You're invited to Orbit</h1>
    <p class="sub" id="subtext">
      Orbit makes it easier to hang out with your friends more. Add them to stay in touch.
    </p>

    <a class="cta" id="cta" href="#" role="button">Get Orbit</a>
    <p class="soon" id="soon">Orbit is launching soon — get it on the App Store shortly. Hang tight!</p>

    <div class="footer">
      Orbit — hang out with your friends more.<br />
      <a href="../privacy.html">Privacy</a> · <a href="../terms.html">Terms</a> · <a href="../support.html">Support</a>
    </div>
  </main>

  <script>
    // ----------------------------------------------------------------------
    // Pre-launch: send people to the TestFlight beta. Swap this for the real
    // App Store listing (https://apps.apple.com/app/orbit/id…) once published.
    // If ever emptied, the "Get Orbit" button falls back to a "launching soon" note.
    const APP_URL = "https://testflight.apple.com/join/Gm7rhqBQ";
    // ----------------------------------------------------------------------

    (function () {
      const params = new URLSearchParams(window.location.search);
      const rawFrom = (params.get("from") || "").trim();
      // Keep it sane: cap length, collapse whitespace. Rendered via textContent
      // (never innerHTML), so it can't inject markup.
      const from = rawFrom.replace(/\s+/g, " ").slice(0, 40);

      if (from) {
        const h1 = document.getElementById("headline");
        h1.textContent = "";
        const name = document.createElement("span");
        name.className = "name";
        name.textContent = from;
        h1.appendChild(name);
        h1.appendChild(document.createTextNode(" invited you to their Orbit"));

        document.getElementById("subtext").textContent =
          "Add " + from + " on Orbit — it makes hanging out with your friends easier.";
        document.title = from + " invited you to Orbit";
      }

      const cta = document.getElementById("cta");
      if (APP_URL) {
        cta.setAttribute("href", APP_URL);
      } else {
        cta.addEventListener("click", function (e) {
          e.preventDefault();
          document.getElementById("soon").classList.add("show");
        });
      }
    })();
  </script>
</body>
</html>
