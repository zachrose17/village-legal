<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>A plan on Village</title>

  <!-- Link unfurl (static — GitHub Pages can't render per-plan previews). -->
  <meta property="og:title" content="A plan on Village" />
  <meta property="og:description" content="Tap in — see who's going and join the plan." />
  <meta property="og:type" content="website" />

  <style>
    :root {
      --bg: #fdfaf5;
      --card: #ffffff;
      --ink1: #2b2622;
      --ink2: #6b6157;
      --ink3: #9a8f83;
      --hair: rgba(43, 38, 34, 0.10);
      --accent: #3478c4;
      --broadcast: #b4612f;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid var(--hair);
      border-radius: 24px;
      padding: 28px 24px 24px;
      box-shadow: 0 12px 40px rgba(43, 38, 34, 0.08);
      text-align: center;
    }
    .wordmark {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--ink3);
      margin-bottom: 22px;
    }
    .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 16px;
      display: block;
      background: #ece5db;
      border: 3px solid #fff;
      box-shadow: 0 4px 14px rgba(43, 38, 34, 0.12);
    }
    .avatar.initials {
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 600; color: var(--ink2);
    }
    .host { font-size: 14px; color: var(--ink2); margin: 0 0 4px; }
    .activity {
      font-size: 23px; font-weight: 600; line-height: 1.25;
      color: var(--broadcast); margin: 0 0 10px;
    }
    .when {
      font-size: 15px; font-weight: 600; color: var(--ink2);
      margin: 0 0 6px;
    }
    .going {
      font-size: 13px; color: var(--ink3); margin: 0 0 24px;
      min-height: 16px;
    }
    .ended {
      font-size: 13px; font-weight: 600; color: var(--ink3);
      background: rgba(43,38,34,0.06); border-radius: 999px;
      display: inline-block; padding: 5px 12px; margin-bottom: 18px;
    }
    .btn {
      display: block; width: 100%;
      font-size: 16px; font-weight: 600;
      padding: 15px; border-radius: 999px;
      text-decoration: none; border: none; cursor: pointer;
      transition: transform 0.08s ease;
    }
    .btn:active { transform: scale(0.985); }
    .btn-primary { background: var(--broadcast); color: #fff; margin-bottom: 10px; }
    .btn-secondary {
      background: transparent; color: var(--ink2);
      border: 1px solid var(--hair);
    }
    .footnote { font-size: 12px; color: var(--ink3); margin: 18px 0 0; line-height: 1.5; }
  </style>
</head>
<body>
  <main class="card">
    <div class="wordmark">Village</div>
    <div id="avatar" class="avatar initials">·</div>
    <p class="host" id="host">A friend invited you to a plan</p>
    <p class="activity" id="activity">A plan on Village</p>
    <p class="when" id="when"></p>
    <p class="going" id="going"></p>
    <div id="ended" class="ended" style="display:none;">This plan has ended</div>

    <a class="btn btn-primary" id="open" href="#">Open in Village</a>
    <a class="btn btn-secondary" id="get" href="#">Get Village</a>

    <p class="footnote">If you have Village, this opens the plan so you can tap in.
      Otherwise, download it first — then open this link again.</p>
  </main>

  <script>
    // ── Config ────────────────────────────────────────────────────────────
    // Where people without the app go. Replace with your live TestFlight or
    // App Store link.
    const GET_APP_URL = "https://testflight.apple.com/join/Gm7rhqBQ";

    const SUPABASE_URL = "https://bwjebaulfmwnettkdhcw.supabase.co";
    // The anon public key is safe to ship in a client — RLS (not this key)
    // protects data, and plan-info returns only display-safe fields.
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3amViYXVsZm13bmV0dGtkaGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5OTQ4MTgsImV4cCI6MjA5NDU3MDgxOH0.uqz7sVvhUZVDeZNcL3HUJMXW6dAc3hi125D6T9DeutA";

    // ── Read the link ─────────────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    const planId = params.get("b") || params.get("id");
    const previewTitle = params.get("t");   // "<host> <activity>"
    const previewWhen  = params.get("w");
    const previewHost  = params.get("h");

    const $ = (id) => document.getElementById(id);
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    // App + store buttons.
    $("get").href = GET_APP_URL;
    const appUrl = planId ? "village://plan?id=" + encodeURIComponent(planId) : null;
    $("open").href = appUrl || GET_APP_URL;

    // ── Immediate preview from the link's own params ──────────────────────
    if (previewHost) $("host").textContent = previewHost + " invited you to a plan";
    if (previewTitle) $("activity").textContent = previewTitle;
    if (previewWhen) $("when").textContent = previewWhen;

    function setInitials(name) {
      const a = $("avatar");
      const initials = (name || "·").trim().split(/\s+/).map(w => w[0]).slice(0, 2).join("").toUpperCase();
      a.className = "avatar initials";
      a.textContent = initials || "·";
    }
    setInitials(previewHost);

    // ── Enrich from plan-info (avatar, going count, ended, fresh copy) ─────
    async function enrich() {
      if (!planId) return;
      try {
        const res = await fetch(SUPABASE_URL + "/functions/v1/plan-info", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": "Bearer " + SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({ id: planId }),
        });
        if (!res.ok) return;
        const data = await res.json();
        if (!data || data.found === false) return;

        const hostName = data.host && data.host.name ? data.host.name : (previewHost || "A friend");
        $("host").textContent = hostName + " invited you to a plan";
        if (data.activity) $("activity").textContent = hostName + " " + data.activity;
        if (data.whenLabel) $("when").textContent = data.whenLabel;

        if (data.host && data.host.avatarURL) {
          const img = document.createElement("img");
          img.className = "avatar";
          img.src = data.host.avatarURL;
          img.alt = escapeHtml(hostName);
          img.onerror = () => setInitials(hostName);
          $("avatar").replaceWith(img);
          img.id = "avatar";
        } else {
          setInitials(hostName);
        }

        if (typeof data.goingCount === "number" && data.goingCount > 0) {
          $("going").textContent = data.goingCount === 1
            ? "1 person is going" : data.goingCount + " people are going";
        }

        if (data.ended) {
          $("ended").style.display = "inline-block";
          $("open").textContent = "Open in Village";
        }
      } catch (_) { /* best-effort; the param preview already rendered */ }
    }
    enrich();
  </script>
</body>
</html>
